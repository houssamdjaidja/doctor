services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-doctor}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-doctor123}
      POSTGRES_DB: ${DB_NAME:-doctor}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-doctor}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file:
      - ./server/.env
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - JWT_SECRET=${JWT_SECRET:-change-this-to-a-long-random-secret-in-production}
      - PORT=${PORT:-3001}
      - DB_HOST=db
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-doctor}
      - DB_PASSWORD=${DB_PASSWORD:-doctor123}
      - DB_NAME=${DB_NAME:-doctor}
    command: sh -c "npx tsx src/docker-init.ts && npx tsx src/index.ts"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=/api

volumes:
  postgres-data:
